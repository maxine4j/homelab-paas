name: homelab
services:
  paas:
    build:
      context: ./
      dockerfile: ./services/paas/Dockerfile
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./paas-config/:/etc/homelab-paas
      - ./config.local.yaml:/etc/homelab-paas/config.yaml
  paas-ui:
    build:
      context: ./
      dockerfile: ./services/paas-ui/Dockerfile
    ports:
      - "3000:3000"
